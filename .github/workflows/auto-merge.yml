name: Auto-merge

# Merges qualifying PRs using the CI-Bot GitHub App after PR checks are green.
# Because the App performs the merge (not GITHUB_TOKEN), the resulting push
# WILL trigger downstream workflows (nightly on dev push, release on main push).
#
# Qualifying PRs:
#   feature → dev             : squash merge
#   dev → main                : merge commit (preserves history for releases)
#   feature → main (main-only): squash merge (only when caller passes main-only: true)
#
# Also fires best-effort delivery-board fast-path dispatches (never fails
# this workflow) via dispatch-project-sync -- see docs/org-project.md's
# "Fast path (repository_dispatch)" section: dispatch-in-review on a PR
# opened/reopened against dev, and two post-merge dispatches in the `enable`
# job (per-issue for a dev merge, full-sweep for a main merge).

on:
  workflow_call:
    inputs:
      main-only:
        description: Repo has no dev branch; treat feature->main like feature->dev (squash merge)
        type: boolean
        required: false
        default: false
    secrets:
      ci-bot-app-id:
        required: true
      ci-bot-app-private-key:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    name: Auto-merge after checks (CI-Bot)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      !github.event.pull_request.draft && (
        (github.event.pull_request.base.ref == 'dev' &&
         github.event.pull_request.head.ref != 'dev' &&
         github.event.pull_request.head.ref != 'main') ||
        (github.event.pull_request.base.ref == 'main' &&
         github.event.pull_request.head.ref == 'dev') ||
        (inputs.main-only == true &&
         github.event.pull_request.base.ref == 'main' &&
         github.event.pull_request.head.ref != 'main')
      )
    steps:
      - name: Mint CI-Bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ci-bot-app-id }}
          private-key: ${{ secrets.ci-bot-app-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          # Any permission-* input switches create-github-app-token from its
          # "all permissions the App has for these repos" default into
          # explicit-only mode -- so every permission this token is actually
          # used for below must be listed here. Companion hardening: narrows
          # this pre-existing mint from an unscoped, installation-wide token
          # (which would silently inherit the new org-installation-level
          # Contents:write on .github once that's granted) down to just this
          # repo, with only the permissions the Wait-for-checks/Merge steps
          # below actually need. The post-merge closingIssuesReferences
          # lookup deliberately does NOT reuse this token -- see its own
          # dedicated read-only mint below, matching dispatch-in-review's
          # pattern -- so this merge-authority token never needs
          # permission-issues here.
          permission-actions: read
          permission-contents: write
          permission-pull-requests: write

      - name: Wait for PR checks
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 120); do
            runs_json=$(gh api "repos/${REPO}/actions/runs" \
              --method GET \
              --field event=pull_request \
              --field head_sha="${HEAD_SHA}" \
              --field per_page=100 \
              --jq '[.workflow_runs[] | select(.path != ".github/workflows/auto-merge.yml")]')

            ci_count=$(jq '[.[] | select(.path == ".github/workflows/ci.yml")] | length' <<<"${runs_json}")
            total=$(jq 'length' <<<"${runs_json}")
            pending=$(jq '[.[] | select(.status != "completed")] | length' <<<"${runs_json}")
            failing=$(jq '[.[] | select(.status == "completed" and (.conclusion | IN("success", "skipped", "neutral") | not))] | length' <<<"${runs_json}")

            echo "attempt=${attempt} ci_count=${ci_count} total=${total} pending=${pending} failing=${failing}"
            jq -r '.[] | "- \(.name) [\(.path)] status=\(.status) conclusion=\(.conclusion // "")"' <<<"${runs_json}"

            if [ "${ci_count}" -gt 0 ] && [ "${pending}" -eq 0 ] && [ "${failing}" -eq 0 ]; then
              echo "All PR checks are green for ${HEAD_SHA}."
              exit 0
            fi

            if [ "${failing}" -gt 0 ]; then
              echo "::error::One or more PR checks failed for ${HEAD_SHA}."
              exit 1
            fi

            sleep 30
          done

          echo "::error::Timed out waiting for PR checks for ${HEAD_SHA}."
          exit 1

      - name: Merge PR
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE: ${{ github.event.pull_request.base.ref }}
          HEAD: ${{ github.event.pull_request.head.ref }}
          MAIN_ONLY: ${{ inputs.main-only }}
        run: |
          if [ "$BASE" = "main" ] && [ "$HEAD" = "dev" ]; then
            # dev → main: keep merge commit so history is linear for releases
            gh pr merge "$PR" --repo "$REPO" --merge
          else
            # feature → dev, or feature → main (main-only repo): squash for a clean history
            gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
          fi
          echo "Merged PR #${PR} (${BASE} target, main-only=${MAIN_ONLY})."

      # Board fast-path (best-effort, never fails this job): a merge to dev
      # dispatches per-issue (the merged PR's linked issues move to On
      # Dev/Released depending on release-reachability -- see
      # org-project-sync.yml's pr_stage()); a merge to main dispatches a
      # full sweep instead, since that covers both a dev→main promote merge
      # and a main-only repo's feature→main merge, both already handled
      # correctly by pr_stage()'s existing logic without per-issue
      # resolution.
      - name: Mint read-only token for post-merge dispatch
        id: post-merge-read-token
        if: success() && github.event.pull_request.base.ref == 'dev'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ci-bot-app-id }}
          private-key: ${{ secrets.ci-bot-app-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          # Dedicated minimal-scope token for the closingIssuesReferences
          # read below -- deliberately not the primary bot-token (which
          # carries contents:write/pull-requests:write merge authority).
          # Matches dispatch-in-review's identical pattern for the same
          # query shape.
          permission-issues: read
          permission-pull-requests: read

      - name: Resolve linked issues for post-merge dispatch
        id: post-merge-linked
        if: success() && github.event.pull_request.base.ref == 'dev'
        env:
          GH_TOKEN: ${{ steps.post-merge-read-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          owner="${REPO%%/*}"
          repo_name="${REPO#*/}"
          numbers=$(gh api graphql \
            -f query='query($owner:String!,$repo:String!,$number:Int!){ repository(owner:$owner,name:$repo){ pullRequest(number:$number){ closingIssuesReferences(first:20){ nodes { number } } } } }' \
            -f owner="$owner" -f repo="$repo_name" -F number="$PR" \
            --jq '[.data.repository.pullRequest.closingIssuesReferences.nodes[].number] | join(" ")' 2>/dev/null)
          rc=$?
          if [ $rc -ne 0 ] || [ -z "${numbers}" ]; then
            echo "::notice::PR #${PR} has no closing-keyword-linked issues (or lookup failed); skipping post-merge fast-path dispatch. An unlinked PR is invisible to the sync no matter how far along it is -- see docs/board-guide.md."
            echo "numbers=" >> "$GITHUB_OUTPUT"
          else
            echo "numbers=${numbers}" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch fast-path sync (dev merge, per-issue)
        if: success() && github.event.pull_request.base.ref == 'dev' && steps.post-merge-linked.outputs.numbers != ''
        uses: automationnexus/.github/.github/actions/dispatch-project-sync@v1
        with:
          ci-bot-app-id: ${{ secrets.ci-bot-app-id }}
          ci-bot-app-private-key: ${{ secrets.ci-bot-app-private-key }}
          repo: ${{ github.event.repository.name }}
          issue-numbers: ${{ steps.post-merge-linked.outputs.numbers }}

      - name: Dispatch fast-path sync (main merge, full sweep)
        if: success() && github.event.pull_request.base.ref == 'main'
        uses: automationnexus/.github/.github/actions/dispatch-project-sync@v1
        with:
          ci-bot-app-id: ${{ secrets.ci-bot-app-id }}
          ci-bot-app-private-key: ${{ secrets.ci-bot-app-private-key }}
          repo: ${{ github.event.repository.name }}
          full-sweep: "true"

  dispatch-in-review:
    name: Dispatch In Review fast-path sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only a genuinely new open-against-dev PR should trigger this -- not
    # `synchronize` (an issue already In Review stays In Review; no rank
    # change), and not a draft (not yet ready for the In Review stage).
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.base.ref == 'dev' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    steps:
      - name: Mint read-only token
        id: read-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ci-bot-app-id }}
          private-key: ${{ secrets.ci-bot-app-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: read
          permission-pull-requests: read

      - name: Resolve linked issues
        id: linked
        env:
          GH_TOKEN: ${{ steps.read-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          owner="${REPO%%/*}"
          repo_name="${REPO#*/}"
          numbers=$(gh api graphql \
            -f query='query($owner:String!,$repo:String!,$number:Int!){ repository(owner:$owner,name:$repo){ pullRequest(number:$number){ closingIssuesReferences(first:20){ nodes { number } } } } }' \
            -f owner="$owner" -f repo="$repo_name" -F number="$PR" \
            --jq '[.data.repository.pullRequest.closingIssuesReferences.nodes[].number] | join(" ")' 2>/dev/null)
          rc=$?
          if [ $rc -ne 0 ] || [ -z "${numbers}" ]; then
            echo "::notice::PR #${PR} has no closing-keyword-linked issues (or lookup failed); skipping fast-path dispatch. An unlinked PR is invisible to the sync no matter how far along it is -- see docs/board-guide.md."
            echo "numbers=" >> "$GITHUB_OUTPUT"
          else
            echo "numbers=${numbers}" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch fast-path project sync
        if: steps.linked.outputs.numbers != ''
        uses: automationnexus/.github/.github/actions/dispatch-project-sync@v1
        with:
          ci-bot-app-id: ${{ secrets.ci-bot-app-id }}
          ci-bot-app-private-key: ${{ secrets.ci-bot-app-private-key }}
          repo: ${{ github.event.repository.name }}
          issue-numbers: ${{ steps.linked.outputs.numbers }}
