# Org-wide delivery board sync. The board is ISSUE-CENTRIC: issues are the
# cards, and this workflow derives each issue's Status from its linked pull
# request(s) (across the supported repositories) rather than classifying PRs
# as cards in their own right.
name: Org Project Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Report planned changes without updating Project items
        required: true
        type: boolean
        default: true
      write_probe:
        description: Run only a write-permission probe (create/verify/delete a draft item); skips the reconciliation sweep
        required: true
        type: boolean
        default: false
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: org-project-sync
  cancel-in-progress: false

env:
  PROJECT_NUMBER: "1"
  OWNER: AutomationNexus
  REPOS: "CognitiveSystems MediaRefinery ModelDeck Uploadarr HomeAssistant ARCRunner"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint CI-Bot App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: CognitiveSystems,MediaRefinery,ModelDeck,Uploadarr,HomeAssistant,ARCRunner
          permission-pull-requests: read
          permission-issues: read  # for Area/Type on private-repo issues; no-op until the CI-Bot App is granted Issues:read
          permission-contents: read
          permission-organization-projects: write

      - name: Sync org project (reconcile or write probe)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          WRITE_PROBE: ${{ github.event_name == 'workflow_dispatch' && inputs.write_probe || false }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          OWNER = os.environ["OWNER"]
          NUMBER = int(os.environ["PROJECT_NUMBER"])
          REPOS = os.environ["REPOS"].split()
          # Main-only repos (no dev branch - e.g. ARCRunner, which just builds a
          # runner image and merges feature branches straight to main). A small
          # explicit set, rather than inferring "no dev base ever seen" from the
          # data - that heuristic would misclassify a real dev/main repo that
          # simply has no recent dev-PR activity in the current items page.
          MAIN_ONLY_REPOS = {"ARCRunner"}
          DRY_RUN = os.environ["DRY_RUN"].lower() == "true"
          WRITE_PROBE = os.environ["WRITE_PROBE"].lower() == "true"

          def gh(*args):
              return json.loads(subprocess.run(
                  ["gh", *args], check=True, capture_output=True, text=True
              ).stdout)

          def graphql(query, **variables):
              command = ["gh", "api", "graphql", "-f", f"query={query}"]
              for key, value in variables.items():
                  if value is None:
                      continue  # omit -> nullable GraphQL var defaults to null (e.g. first-page cursor)
                  if isinstance(value, bool):
                      command += ["-F", f"{key}={'true' if value else 'false'}"]
                  elif isinstance(value, int):
                      command += ["-F", f"{key}={value}"]  # typed, for Int! vars
                  else:
                      command += ["-f", f"{key}={value}"]  # raw string: IDs, cursors, titles
              result = subprocess.run(command, check=True, capture_output=True, text=True)
              payload = json.loads(result.stdout)
              if payload.get("errors"):
                  raise RuntimeError("; ".join(error["message"] for error in payload["errors"]))
              return payload["data"]

          def fail(message):
              print(f"ERROR: {message}", file=sys.stderr)
              raise SystemExit(1)

          def write_summary(lines):
              print("\n".join(lines))
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")

          def is_delivery_digest_issue(issue):
              # The board-digest.yml workflow's single rolling tracking issue
              # (title "\U0001F4CA Delivery digest", lives in .github) is a
              # perpetual auto-managed meta-issue, not a real deliverable - it
              # must never be swept to Done even if it's ever closed/reopened.
              if issue is None:
                  return False
              title = (issue.get("title") or "").lower()
              return "delivery digest" in title

          project = graphql("""
            query($owner:String!,$number:Int!){
              organization(login:$owner){ projectV2(number:$number){
                id
                status: field(name:"Status"){ ... on ProjectV2SingleSelectField {
                  id options { id name }
                }}
                areaType: field(name:"Area/Type"){ ... on ProjectV2SingleSelectField {
                  id options { id name }
                }}
              }}
            }
          """, owner=OWNER, number=NUMBER)["organization"]["projectV2"]
          if not project:
              fail(f"Project {OWNER}#{NUMBER} was not found")
          status = project.get("status")
          if not status:
              fail(f'Project {OWNER}#{NUMBER} is missing the "Status" field')
          options = {option["name"]: option["id"] for option in status["options"]}
          required = ("In Review", "Promote Pending", "On Dev", "Released")
          missing = [name for name in required if name not in options]
          if missing:
              fail(f'Project {OWNER}#{NUMBER} Status is missing: {", ".join(missing)}')

          # Area/Type auto-fill is an enhancement, not core: if the field isn't on
          # the board, skip all Area/Type work below rather than failing the run.
          area_type_field = project.get("areaType")
          HAS_AREA_TYPE = bool(area_type_field)
          area_type_options = (
              {option["name"]: option["id"] for option in area_type_field["options"]}
              if HAS_AREA_TYPE else {}
          )

          # Closed-issue -> Done reconciliation is an enhancement, not core: if
          # the "Done" Status option isn't on the board yet, skip this feature
          # entirely rather than failing the run (same pattern as Area/Type
          # above). Done is just another option on the existing Status field,
          # not a separate field, so this reads from `options` rather than
          # querying a dedicated field like areaType above.
          HAS_DONE = "Done" in options

          def set_single_select(item_id, field_id, option_id):
              graphql("""
                mutation($project:ID!,$item:ID!,$field:ID!,$option:String!){
                  updateProjectV2ItemFieldValue(input:{projectId:$project,itemId:$item,
                    fieldId:$field,value:{singleSelectOptionId:$option}}){ projectV2Item { id } }
                }
              """, project=project["id"], item=item_id, field=field_id, option=option_id)

          def set_status(item_id, option_id):
              set_single_select(item_id, status["id"], option_id)

          def write_probe():
              if "Backlog" not in options:
                  fail(f'Project {OWNER}#{NUMBER} Status is missing "Backlog", required for the write probe')

              run_id = os.environ.get("GITHUB_RUN_ID", "local")
              title = f"[probe] org-project-sync write test {run_id}"
              created = graphql("""
                mutation($project:ID!,$title:String!){
                  addProjectV2DraftIssue(input:{projectId:$project, title:$title}){
                    projectItem { id }
                  }
                }
              """, project=project["id"], title=title)
              item_id = created["addProjectV2DraftIssue"]["projectItem"]["id"]

              verified = False
              assert_error = None
              try:
                  set_status(item_id, options["Backlog"])
                  readback = graphql("""
                    query($id:ID!){
                      node(id:$id){
                        ... on ProjectV2Item {
                          fieldValueByName(name:"Status"){
                            ... on ProjectV2ItemFieldSingleSelectValue { name }
                          }
                        }
                      }
                    }
                  """, id=item_id)
                  observed = ((readback.get("node") or {}).get("fieldValueByName") or {}).get("name")
                  if observed == "Backlog":
                      verified = True
                  else:
                      assert_error = f"expected Status=Backlog, observed {observed!r}"
              except Exception as exc:  # noqa: BLE001 - always fall through to cleanup below
                  assert_error = str(exc)
              finally:
                  deleted = False
                  try:
                      graphql("""
                        mutation($project:ID!,$item:ID!){
                          deleteProjectV2Item(input:{projectId:$project, itemId:$item}){ deletedItemId }
                        }
                      """, project=project["id"], item=item_id)
                      deleted = True
                  except Exception as exc:  # noqa: BLE001 - report clearly, handled below
                      print(f"ERROR: write probe failed to delete probe item {item_id}: {exc}",
                            file=sys.stderr)

              outcome = "pass" if verified and deleted else "fail"
              write_summary([
                  "### Org Project Sync (write probe)",
                  f"- Probe item created: {item_id}",
                  f"- Status verified: {'yes' if verified else 'no'}",
                  f"- Probe item deleted: {'yes' if deleted else 'no'}",
                  f"- Result: {outcome}",
              ])

              if not deleted:
                  fail(f"Write probe cleanup failed to delete item {item_id}")
              if not verified:
                  fail(f"Write probe verification failed: {assert_error}")

          def reconcile():
              # Done sits just below Released, not tied with it: an issue
              # already at Done can still advance to Released if a linked PR
              # is later found to have actually shipped (Done -> Released is
              # a correction, not a downgrade), while the never-downgrade
              # guard below still stops every ordinary pipeline stage
              # (Backlog..Promote Pending) from overwriting Done, and stops
              # Done itself from ever overwriting Released. Released remains
              # the sole ceiling.
              RANK = {
                  "Backlog": 0,
                  "In Progress": 1,
                  "In Review": 2,
                  "On Dev": 3,
                  "Promote Pending": 4,
                  "Done": 5,
                  "Released": 6,
              }

              issue_items = []
              all_items = []
              non_issue_items = 0
              after = None
              while True:
                  page = graphql("""
                    query($owner:String!,$number:Int!,$after:String){
                      organization(login:$owner){ projectV2(number:$number){
                        items(first:100, after:$after){
                          pageInfo { hasNextPage endCursor }
                          nodes { id content { __typename
                              ... on PullRequest {
                                url
                              }
                              ... on Issue {
                                url
                                state
                                title
                                repository { name owner { login } }
                                labels(first:20){ nodes { name } }
                                closedByPullRequestsReferences(first:20, includeClosedPrs:true){
                                  nodes {
                                    number
                                    state
                                    merged
                                    baseRefName
                                    headRefName
                                    mergeCommit { oid }
                                    repository { name owner { login } }
                                  }
                                }
                              }
                            }
                            fieldValues(first:100) { nodes { ... on ProjectV2ItemFieldSingleSelectValue {
                              field { ... on ProjectV2FieldCommon { id } }
                              name
                            }}}}
                        }
                      }}
                    }
                  """, owner=OWNER, number=NUMBER, after=after)
                  items = page["organization"]["projectV2"]["items"]
                  for item in items["nodes"]:
                      content = item.get("content") or {}
                      if content.get("__typename") != "Issue":
                          # The delivery board tracks ISSUES only now. A PR
                          # item still on the board is a legacy card from
                          # before this redesign -- left fully untouched here
                          # (never classified, never given a Status write);
                          # it's archived separately. A PR's relationship to
                          # its issue is surfaced via the built-in Linked
                          # pull requests field on the issue instead.
                          non_issue_items += 1
                          continue
                      current = next((value.get("name") for value in item["fieldValues"]["nodes"]
                                      if value.get("field", {}).get("id") == status["id"]), None)
                      linked_prs = (content.get("closedByPullRequestsReferences") or {}).get("nodes") or []
                      issue = {
                          "url": content["url"],
                          "state": content["state"],
                          "title": content.get("title"),
                          "repository": content["repository"],
                          "linked_prs": linked_prs,
                      }
                      issue_items.append({
                          "item_id": item["id"],
                          "current_status": current,
                          "issue": issue,
                      })
                      if HAS_AREA_TYPE:
                          current_area_type = next(
                              (value.get("name") for value in item["fieldValues"]["nodes"]
                               if value.get("field", {}).get("id") == area_type_field["id"]), None)
                          labels = [label["name"] for label in (content.get("labels") or {}).get("nodes", [])]
                          all_items.append({
                              "item_id": item["id"],
                              "labels": labels,
                              "repository": content.get("repository"),
                              "current_area_type": current_area_type,
                          })
                  if not items["pageInfo"]["hasNextPage"]:
                      break
                  after = items["pageInfo"]["endCursor"]

              counts = {
                  "issues_scanned": 0, "non_issue_items": non_issue_items,
                  "digest_issue_skipped": 0, "linked_prs_resolved": 0,
                  "would_update": 0, "updated": 0, "already_correct": 0,
                  "in_review": 0, "on_dev": 0, "promote_pending": 0,
                  "released": 0, "done": 0,
                  "backlog_defaulted": 0, "open_no_pr_unchanged": 0,
                  "done_skipped_no_option": 0, "released_skipped": 0,
                  "blocked_skipped": 0, "manual_unknown_skipped": 0,
                  "regressions_suppressed": 0, "errors": 0,
                  "ref_resolution_errors": 0,
                  "area_type_set": 0, "area_type_skipped_manual": 0, "area_type_no_match": 0,
              }

              release_ref_cache = {}

              def release_ref(repo):
                  # Latest semver vX.Y.Z tag reachable from main. None if unresolved (e.g. no
                  # release has ever been tagged yet -- reported as "On Dev" until one lands).
                  if repo in release_ref_cache:
                      return release_ref_cache[repo]
                  ref = None
                  try:
                      tags = gh("api", "--paginate", f"repos/{OWNER}/{repo}/git/matching-refs/tags/v")
                      candidates = []
                      for entry in tags:
                          name = entry["ref"]
                          if name.startswith("refs/tags/"):
                              name = name[len("refs/tags/"):]
                          match = re.match(r"^v(\d+)\.(\d+)\.(\d+)$", name)
                          if match:
                              candidates.append((tuple(int(part) for part in match.groups()), name))
                      candidates.sort(key=lambda pair: pair[0], reverse=True)
                      for _, tag_name in candidates:
                          compare = gh("api", f"repos/{OWNER}/{repo}/compare/main...{tag_name}")
                          if compare.get("status") in ("identical", "behind"):
                              ref = tag_name
                              break
                  except Exception:  # noqa: BLE001 - fail-open to None, cached below
                      counts["ref_resolution_errors"] += 1
                      ref = None
                  release_ref_cache[repo] = ref
                  return ref

              def released_or_ondev(repo, pr):
                  # #52: decide Released vs On Dev by whether the PR's merge commit is
                  # reachable from main's current tip, not by exact ancestry to the
                  # latest vX.Y.Z tag. Repos whose promote step creates brand-new
                  # commits on main (e.g. ModelDeck's add-on/config-sync chores,
                  # #121) never fast-forward the dev merge OID onto a tagged commit,
                  # so tag-ancestry compare permanently reports "diverged" even
                  # though the change already shipped. compare(main...merge_oid)
                  # instead asks "is merge_oid an ancestor of (or equal to) main
                  # HEAD" - true for both a fast-forwarded release and a
                  # squash/rebuild-style promote that folds the same commit forward,
                  # and false for anything still only on dev (status "ahead" or
                  # "diverged" relative to main). release_ref() is still invoked
                  # here (result unused for the decision) purely so its
                  # ref_resolution_errors accounting/caching keeps reporting tag
                  # lookup health for the summary - see #37.
                  release_ref(repo)
                  merge_oid = (pr.get("mergeCommit") or {}).get("oid")
                  if merge_oid is None:
                      return "On Dev"
                  try:
                      compare = gh("api", f"repos/{OWNER}/{repo}/compare/main...{merge_oid}")
                      if compare.get("status") in ("identical", "behind"):
                          return "Released"
                      return "On Dev"
                  except Exception:  # noqa: BLE001 - fail-open, never abort the sweep
                      counts["errors"] += 1
                      return "On Dev"

              def pr_stage(pr):
                  # Classifies a single linked PR into one pipeline stage, or
                  # None if it isn't (yet) pipeline-classifiable -- e.g. a
                  # `.github` PR merged to `master` (out of REPOS scope), or a
                  # CLOSED-unmerged PR. Reuses the pre-redesign PR-classification
                  # logic verbatim (previously applied to the PR's own board
                  # item; now applied to each of an issue's linked PRs). Pure
                  # function: release_ref()/released_or_ondev() above are what
                  # account errors/ref_resolution_errors, not pr_stage itself.
                  repo = pr["repository"]["name"]
                  owner_login = pr["repository"]["owner"]["login"]
                  if owner_login != OWNER or repo not in REPOS:
                      return None
                  state = pr["state"]
                  if state == "OPEN":
                      if pr["baseRefName"] == "dev":
                          return "In Review"
                      if (
                          pr["baseRefName"] == "main"
                          and pr["headRefName"].startswith("sync/publish-main-promote-")
                      ):
                          return "Promote Pending"
                      return None
                  if state == "MERGED" and pr["baseRefName"] == "dev":
                      return released_or_ondev(repo, pr)
                  if state == "MERGED" and pr["baseRefName"] == "main":
                      if pr["headRefName"].startswith("sync/publish-main-"):
                          # A promote-branch (sync/publish-main-promote-*) or any
                          # other publish-flow branch (e.g. ModelDeck's nightly
                          # add-on-only sync/publish-main-<version>, or a
                          # pin-sync push) just landed on main - deliberately
                          # broader than just the "-promote-" prefix, see gap-2
                          # notes.
                          return "Released"
                      if repo in MAIN_ONLY_REPOS:
                          # Main-only repos (no dev branch - e.g. ARCRunner)
                          # merge ordinary feature branches straight to main;
                          # that merge IS the release, there's no separate
                          # promote/publish step to wait for.
                          return "Released"
                      return None
                  # MERGED to a base other than dev/main, or CLOSED unmerged.
                  return None

              STATUS_BUCKET = {
                  "In Review": "in_review",
                  "On Dev": "on_dev",
                  "Promote Pending": "promote_pending",
                  "Released": "released",
                  "Done": "done",
              }

              for entry in issue_items:
                  item_id = entry["item_id"]
                  current = entry["current_status"]
                  issue = entry["issue"]
                  counts["issues_scanned"] += 1

                  # The board-digest.yml tracking issue is a perpetual
                  # auto-managed meta-issue, never a real deliverable - skip it
                  # entirely (not just the Done transition) so nothing below
                  # ever touches its Status, even if it's ever closed/reopened.
                  if is_delivery_digest_issue(issue):
                      counts["digest_issue_skipped"] += 1
                      continue
                  if current == "Released":
                      counts["released_skipped"] += 1
                      continue
                  if current == "Blocked":
                      counts["blocked_skipped"] += 1
                      continue

                  linked_prs = issue.get("linked_prs") or []
                  counts["linked_prs_resolved"] += len(linked_prs)
                  stages = [pr_stage(pr) for pr in linked_prs]
                  classified = [stage for stage in stages if stage is not None]
                  max_stage = max(classified, key=lambda stage: RANK[stage]) if classified else None

                  if max_stage is not None:
                      # A classifiable linked PR always wins, regardless of the
                      # issue's own open/closed state - the deliverable's real
                      # pipeline position is what matters (e.g. a Released
                      # linked PR means Released even if the issue itself was
                      # never formally closed).
                      target = max_stage
                  elif issue["state"] == "CLOSED":
                      # Closed, no classifiable linked PR: a completed
                      # deliverable with no versioned release (meta/decision
                      # work, a .github-only change, wontfix, etc). Only if
                      # the board actually has the "Done" option yet - it may
                      # not, until scripts/bootstrap-org-project.sh is next run
                      # against the live board - skip (not fail) if absent,
                      # same fail-open pattern as Area/Type above.
                      if not HAS_DONE:
                          counts["done_skipped_no_option"] += 1
                          continue
                      target = "Done"
                  else:
                      # Open issue, no classifiable linked PR: default a
                      # status-less item (e.g. a freshly auto-added issue) to
                      # Backlog. Never overrides an existing status.
                      if current is None and "Backlog" in options:
                          if not DRY_RUN:
                              set_status(item_id, options["Backlog"])
                          counts["backlog_defaulted"] += 1
                      else:
                          counts["open_no_pr_unchanged"] += 1
                      continue

                  if current is None:
                      cur_rank = -1
                  elif current in RANK:
                      cur_rank = RANK[current]
                  else:
                      counts["manual_unknown_skipped"] += 1
                      continue

                  tgt_rank = RANK[target]
                  if tgt_rank == cur_rank:
                      counts["already_correct"] += 1
                      continue
                  if tgt_rank < cur_rank:
                      counts["regressions_suppressed"] += 1
                      continue

                  counts["would_update"] += 1
                  counts[STATUS_BUCKET[target]] += 1
                  if not DRY_RUN:
                      set_status(item_id, options[target])
                      counts["updated"] += 1

              # Area/Type auto-fill pass: independent of Status above, and a no-op
              # entirely when the board has no Area/Type field. Never overrides a
              # manually-set value; maps at most the first recognized label.
              AREA_TYPE_LABEL_MAP = {
                  "bug": "bug",
                  "enhancement": "feature",
                  "documentation": "docs",
                  "security": "security",
                  "chore": "chore",
              }
              if HAS_AREA_TYPE:
                  for entry in all_items:
                      if entry["current_area_type"] is not None:
                          counts["area_type_skipped_manual"] += 1
                          continue
                      repo_info = entry["repository"] or {}
                      if (repo_info.get("owner") or {}).get("login") != OWNER:
                          continue  # out of scope; mirrors PR out-of-scope handling, not separately counted
                      target_name = next(
                          (AREA_TYPE_LABEL_MAP[label] for label in entry["labels"]
                           if label in AREA_TYPE_LABEL_MAP and AREA_TYPE_LABEL_MAP[label] in area_type_options),
                          None,
                      )
                      if target_name is None:
                          counts["area_type_no_match"] += 1
                          continue
                      if not DRY_RUN:
                          set_single_select(entry["item_id"], area_type_field["id"], area_type_options[target_name])
                      counts["area_type_set"] += 1

              # No cross-check pass in the issue-centric model: the old pass
              # independently REST-swept open PRs and compared their expected
              # Status against the item-driven pass's result. That only made
              # sense when a PR's own board item carried Status; now Status
              # lives on the issue, derived from linked PRs, so there is no
              # comparable second signal to check the item-driven pass
              # against without just re-deriving the exact same thing. Fully
              # removed rather than reworked -- see PR description.

              mode = "dry run" if DRY_RUN else "mutation"
              write_summary([
                  f"### Org Project Sync ({mode})",
                  f"- Issues scanned: {counts['issues_scanned']}",
                  f"- Non-issue items on board (legacy PR cards, untouched): {counts['non_issue_items']}",
                  f"- Delivery-digest tracking issue skipped: {counts['digest_issue_skipped']}",
                  f"- Linked PRs resolved (across all scanned issues): {counts['linked_prs_resolved']}",
                  f"- Would update: {counts['would_update']}",
                  f"- Actual updated: {counts['updated']}",
                  f"- Already correct: {counts['already_correct']}",
                  (
                      f"- Target buckets: In Review {counts['in_review']}, "
                      f"On Dev {counts['on_dev']}, "
                      f"Promote Pending {counts['promote_pending']}, "
                      f"Released {counts['released']}, Done {counts['done']}"
                  ),
                  f"- Defaulted to Backlog (item-added, no classifiable linked PR yet): {counts['backlog_defaulted']}",
                  f"- Open, no classifiable linked PR (untouched): {counts['open_no_pr_unchanged']}",
                  (
                      f"- Closed, no classifiable linked PR, but Done option absent on board (skipped): "
                      f"{counts['done_skipped_no_option']}"
                      + ("" if HAS_DONE else " (Done field not yet on board - run bootstrap-org-project.sh)")
                  ),
                  f"- Already Released (untouched): {counts['released_skipped']}",
                  f"- Blocked (untouched): {counts['blocked_skipped']}",
                  f"- Unknown custom status (untouched): {counts['manual_unknown_skipped']}",
                  f"- Regressions suppressed (never downgraded, incl. Released/Done never overwritten): "
                  f"{counts['regressions_suppressed']}",
                  f"- Release-ref/compare errors (fail-open to On Dev): {counts['errors']}",
                  f"- Ref-resolution failures (tag-list/compare lookup errors, cached fail-open to null): "
                  f"{counts['ref_resolution_errors']}",
                  (
                      f"- Area/Type auto-fill: {counts['area_type_set']} set, "
                      f"{counts['area_type_skipped_manual']} skipped (already manual), "
                      f"{counts['area_type_no_match']} no matching label"
                      + ("" if HAS_AREA_TYPE else " (field absent on board - skipped)")
                  ),
              ])

          if WRITE_PROBE:
              write_probe()
          else:
              reconcile()
          PY
