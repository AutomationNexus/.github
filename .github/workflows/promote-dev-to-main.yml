name: Promote dev to main

on:
  workflow_call:
    inputs:
      runner-labels:
        required: false
        default: '["ubuntu-latest"]'
        type: string
      exclude-paths:
        description: >-
          Newline-separated list of paths that main owns exclusively and that this promote
          must never overwrite with dev's copy (e.g. a nightly-channel add-on pointer file
          published straight to main by another workflow). A throwaway branch is based on
          main, merges dev's changes, then restores these paths to main's current content.
        required: false
        default: ""
        type: string
      strip-dev-only-paths:
        description: >-
          When true, delete files tracked on dev that match .github/dev-only-paths (if that
          file exists on dev) from the promote branch before opening the PR -- e.g. CLAUDE.md,
          .claude/, and other dev-only tooling that must never land on main. Unlike
          exclude-paths (which restores main's existing copy of a path dev also touched),
          this removes paths main should never have at all, even if main has never had them.
        required: false
        default: false
        type: boolean
      bump-type:
        description: >-
          Version bump to apply to pyproject.toml's [project].version before merging, based on
          the latest vX.Y.Z tag reachable on main: 'patch' (default) increments Z, wrapping
          1-99 into a Y bump when it would exceed 99; 'minor' increments Y and resets Z to 1;
          'major' increments X and resets Y and Z to 1; 'none' skips version bumping entirely
          (e.g. for an add-on-only auto-promote that must not touch the app version). Requires
          a pyproject.toml on the branch -- silently skipped if none exists.
        required: false
        default: 'patch'
        type: string
      version-file:
        description: >-
          Bare X.Y.Z file (e.g. VERSION) to bump instead of pyproject.toml, for a repo with
          no pyproject.toml to version. Leave empty (default) to keep bumping
          pyproject.toml's [project].version unchanged. When set, the same bump-type math
          (including the patch wrap-at-99 rule) applies to this file instead, and the file
          is created with the computed version if it doesn't already exist -- no manual
          seeding required.
        required: false
        default: ""
        type: string
    secrets:
      ci-bot-app-id:
        required: true
      ci-bot-app-private-key:
        required: true

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Promote dev to main
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    timeout-minutes: 30
    steps:
      - name: Require green dev CI
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const ci = workflows.workflows.find((w) => w.path === ".github/workflows/ci.yml");
            if (!ci) { core.setFailed("CI workflow not found"); return; }

            // A push-triggered promote (e.g. an add-on-only auto-promote) fires from the
            // same push event that also triggers ci.yml on dev -- they can race, with
            // ci.yml's run not registered yet when this check first runs. Poll instead of
            // checking once.
            //
            // event: "push" matters here: a PR whose head branch happens to be literally
            // named "dev" (e.g. a stale/duplicate promote PR) also shows up as a workflow
            // run "on branch dev", and a pull_request-triggered run can be newer than the
            // real push-triggered dev CI run -- without this filter that stale/unrelated
            // run outranks the actual dev CI result and can wrongly fail this gate.
            let run;
            for (let attempt = 1; attempt <= 20; attempt++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: ci.id, branch: "dev", event: "push", per_page: 1,
              });
              run = data.workflow_runs[0];
              if (run && run.status === "completed") break;
              core.info(`Attempt ${attempt}/20: latest dev CI run is ${run ? run.status : "not found yet"}, waiting...`);
              await new Promise((r) => setTimeout(r, 15000));
            }
            if (!run || run.conclusion !== "success") {
              core.setFailed(`Latest dev CI must be success (got ${run ? (run.conclusion ?? run.status) : "none"})`);
              return;
            }
            core.info(`Dev CI run ${run.id} succeeded at ${run.updated_at}`);

      - name: Mint CI-Bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ci-bot-app-id }}
          private-key: ${{ secrets.ci-bot-app-private-key }}
          owner: ${{ github.repository_owner }}
          # Narrowed to just this repo (companion hardening, same as
          # auto-merge.yml). No permission-* input is added, so the default
          # "all permissions the App has for this repo" behavior is
          # unchanged -- this only narrows which repo the token reaches.
          repositories: ${{ github.event.repository.name }}

      - name: Mint .github dispatch token
        id: github-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ci-bot-app-id }}
          private-key: ${{ secrets.ci-bot-app-private-key }}
          owner: ${{ github.repository_owner }}
          # Separate, narrowly-scoped token reaching ONLY .github, with ONLY
          # Contents permission -- deliberately isolated from the primary
          # bot-token above, which does the actual push/merge on this repo.
          # Used for two things below: (1) checking out
          # automationnexus/.github's promote-reconcile.py helper (read),
          # and (2) firing this promote's board fast-path dispatches at
          # .github's repository_dispatch endpoint, which GitHub gates on
          # Contents:write (dispatch_project_sync_full_sweep()). Keeping
          # this isolated from the primary token means a compromise of this
          # repo's promote flow (e.g. malicious dev-branch content) can
          # never leverage write access to .github.
          repositories: .github
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      # Reusable workflow files execute in the caller repository, so obtain the matching
      # helper from the stable shared-workflow ref without adding it to the promote branch.
      - name: Checkout promotion reconciliation helper
        uses: actions/checkout@v6
        with:
          repository: automationnexus/.github
          ref: v1
          path: .promotion-workflow-tools-${{ github.run_id }}
          fetch-depth: 1
          token: ${{ steps.github-token.outputs.token }}
          # This checkout only ever reads workflow tooling (never commits
          # here) and the whole directory is rm -rf'd before this job's own
          # git add -A -- persisting the .github-scoped token into
          # .git/config anyway would be an unnecessary residual credential.
          persist-credentials: false

      - name: Promote dev to main via PR (CI-Bot)
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GITHUB_DISPATCH_TOKEN: ${{ steps.github-token.outputs.token }}
          REPO: ${{ github.repository }}
          EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
          STRIP_DEV_ONLY_PATHS: ${{ inputs.strip-dev-only-paths }}
          BUMP_TYPE: ${{ inputs.bump-type }}
          VERSION_FILE: ${{ inputs.version-file }}
          PROMOTION_TOOLS_DIR: .promotion-workflow-tools-${{ github.run_id }}
        run: |
          set -euo pipefail
          ahead=$(gh api "repos/${REPO}/compare/main...dev" --jq '.ahead_by')
          echo "dev is ${ahead} commit(s) ahead of main."
          if [ "${ahead}" = "0" ]; then
            echo "Nothing to promote."; exit 0
          fi

          NEEDS_TEMP_BRANCH=""
          if [ -n "${EXCLUDE_PATHS}" ] || [ "${STRIP_DEV_ONLY_PATHS}" = "true" ] || [ "${BUMP_TYPE}" != "none" ]; then
            NEEDS_TEMP_BRANCH=1
          fi

          PR_TITLE="release: promote dev to main"
          if [ "${BUMP_TYPE}" = "minor" ]; then
            PR_TITLE="${PR_TITLE} (Minor)"
          elif [ "${BUMP_TYPE}" = "major" ]; then
            PR_TITLE="${PR_TITLE} (Major)"
          fi

          dispatch_project_sync_full_sweep() {
            # Board fast-path (best-effort, inlined rather than the
            # dispatch-project-sync composite action -- this file's control
            # flow is one long retried script, not discrete steps). A
            # promote PR folds multiple issues together, so a full sweep is
            # dispatched instead of resolving individual issue numbers.
            # Uses the separate, narrowly-scoped .github-only token minted
            # above (GITHUB_DISPATCH_TOKEN) -- deliberately isolated from
            # the primary bot-token (GH_TOKEN) that does this repo's actual
            # push/merge, so this dispatch call never runs with more than
            # Contents:write on .github. Called once the promote PR is
            # confirmed to exist (Promote Pending) and again right after it
            # merges (Released). The `if !` guard (not `set -e`) is what
            # keeps a dispatch failure from aborting this whole script --
            # the hourly org-project-sync.yml cron remains the real
            # reconciliation safety net.
            local promote_owner="${REPO%%/*}"
            local promote_repo="${REPO#*/}"
            if ! GH_TOKEN="${GITHUB_DISPATCH_TOKEN}" gh api "repos/${promote_owner}/.github/dispatches" \
                -f event_type=project-sync \
                -f "client_payload[owner]=${promote_owner}" \
                -f "client_payload[repo]=${promote_repo}" \
                -F "client_payload[full_sweep]=true" >/dev/null 2>&1; then
              echo "::warning::project-sync dispatch (full sweep) failed for ${REPO} (best-effort fast path; the hourly cron remains the safety net)."
            fi
          }

          # A reconciliation branch starts from a fresh main snapshot, then merges dev. This
          # handles historical dev/main divergence (not just a main update during this run):
          # the resulting PR already contains main as an ancestor. If main moves while the PR
          # is being validated or merged, rebuild the whole branch from fresh refs and retry.
          for RETRY in 1 2 3; do
            HEAD_BRANCH="dev"

            if [ -n "${NEEDS_TEMP_BRANCH}" ]; then
              echo "building a main-based reconciled promote branch (attempt ${RETRY}/3)"
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git fetch origin main dev
              TEMP_BRANCH="sync/publish-main-promote-${{ github.run_id }}-${RETRY}"
              git checkout -B "${TEMP_BRANCH}" origin/main
              NEW_VERSION=$(python3 "${PROMOTION_TOOLS_DIR}/scripts/promote-reconcile.py" \
                --main-ref origin/main \
                --dev-ref origin/dev \
                --exclude-paths "${EXCLUDE_PATHS}" \
                --strip-dev-only-paths "${STRIP_DEV_ONLY_PATHS}" \
                --bump-type "${BUMP_TYPE}" \
                --version-file "${VERSION_FILE}")
              if [ -n "${NEW_VERSION}" ]; then
                echo "Bumping version to ${NEW_VERSION}"
              fi

              # The helper checkout is workflow tooling, never promotion content.
              rm -rf "${PROMOTION_TOOLS_DIR}"
              git add -A
              if git diff --cached --quiet; then
                echo "No changes needed after reconciling dev onto main."
              else
                if [ -n "${NEW_VERSION}" ]; then
                  git commit -m "chore(promote): reconcile dev onto main, bump version to ${NEW_VERSION}"
                else
                  git commit -m "chore(promote): reconcile dev onto main"
                fi
              fi
              if ! git merge-base --is-ancestor origin/main "${TEMP_BRANCH}"; then
                echo "::error::Reconciled promotion branch is not based on current main."; exit 1
              fi
              ahead2=$(git rev-list --count origin/main.."${TEMP_BRANCH}")
              if [ "${ahead2}" = "0" ]; then
                echo "Nothing to promote after reconciliation."; exit 0
              fi
              git push origin "${TEMP_BRANCH}"
              HEAD_BRANCH="${TEMP_BRANCH}"
            fi

            pr=$(gh pr list --repo "${REPO}" --base main --head "${HEAD_BRANCH}" --state open \
                 --json number --jq '.[0].number // empty')
            if [ -z "${pr}" ]; then
              gh pr create --repo "${REPO}" --base main --head "${HEAD_BRANCH}" \
                --title "${PR_TITLE}" \
                --body "Automated promotion after dev CI passed. Merges when CI on this PR is green."
              pr=$(gh pr list --repo "${REPO}" --base main --head "${HEAD_BRANCH}" --state open \
                   --json number --jq '.[0].number // empty')
            fi

            if [ -z "${pr}" ]; then
              echo "::error::Promotion PR not found after creation."; exit 1
            fi
            dispatch_project_sync_full_sweep  # Promote Pending

            head_sha=$(gh pr view "${pr}" --repo "${REPO}" --json headRefOid --jq '.headRefOid')
            echo "Waiting for CI on promotion PR #${pr} (head ${head_sha})..."
            for attempt in $(seq 1 120); do
              runs_json=$(gh api "repos/${REPO}/actions/runs" \
                --method GET \
                --field event=pull_request \
                --field head_sha="${head_sha}" \
                --field per_page=100 \
                --jq '[.workflow_runs[] | select(.path != ".github/workflows/auto-merge.yml" and .path != ".github/workflows/promote-dev-to-main.yml")]')
              ci_count=$(jq '[.[] | select(.path == ".github/workflows/ci.yml")] | length' <<<"${runs_json}")
              pending=$(jq '[.[] | select(.status != "completed")] | length' <<<"${runs_json}")
              failing=$(jq '[.[] | select(.status == "completed" and (.conclusion | IN("success", "skipped", "neutral") | not))] | length' <<<"${runs_json}")
              echo "attempt=${attempt} ci_count=${ci_count} pending=${pending} failing=${failing}"
              if [ "${ci_count}" -gt 0 ] && [ "${pending}" -eq 0 ] && [ "${failing}" -eq 0 ]; then
                echo "Promotion PR #${pr} CI is green."; break
              fi
              if [ "${failing}" -gt 0 ]; then
                echo "::error::Promotion PR #${pr} CI failed."; exit 1
              fi
              if [ "${attempt}" -eq 120 ]; then
                echo "::error::Timed out waiting for promotion PR #${pr} CI."; exit 1
              fi
              sleep 30
            done

            mergeable=$(gh pr view "${pr}" --repo "${REPO}" --json mergeable --jq '.mergeable')
            if [ "${mergeable}" = "CONFLICTING" ]; then
              echo "::warning::Promotion PR #${pr} has merge conflicts (main moved during the snapshot window)."
              if [ -n "${NEEDS_TEMP_BRANCH}" ] && [ "${RETRY}" -lt 3 ]; then
                echo "Closing #${pr} and retrying from a fresh main snapshot..."
                gh pr close "${pr}" --repo "${REPO}" --delete-branch
                sleep 5
                continue
              fi
              echo "::error::Promotion PR #${pr} still conflicts after retries."; exit 1
            fi

            echo "Merging promotion PR #${pr} (CI-Bot)..."
            set +e
            if [ "${HEAD_BRANCH}" != "dev" ]; then
              merge_out=$(gh pr merge "${pr}" --repo "${REPO}" --merge --delete-branch 2>&1)
            else
              merge_out=$(gh pr merge "${pr}" --repo "${REPO}" --merge 2>&1)
            fi
            merge_rc=$?
            set -e
            echo "${merge_out}"
            if [ "${merge_rc}" -eq 0 ]; then
              echo "Merged promotion PR #${pr}."
              dispatch_project_sync_full_sweep  # Released
              break
            fi
            if echo "${merge_out}" | grep -qi "conflict" && [ -n "${NEEDS_TEMP_BRANCH}" ] && [ "${RETRY}" -lt 3 ]; then
              echo "::warning::Merge failed on a conflict; retrying from a fresh main snapshot..."
              gh pr close "${pr}" --repo "${REPO}" --delete-branch || true
              sleep 5
              continue
            fi
            echo "::error::Failed to merge promotion PR #${pr}."; exit 1
          done
