name: Nightly Build

on:
  workflow_call:
    inputs:
      runner-labels:
        required: false
        default: '["ubuntu-latest"]'
        type: string
      image-name:
        required: true
        type: string
      platforms:
        required: false
        default: "linux/amd64"
        type: string
      force_run:
        required: false
        default: false
        type: boolean
      has-frontend:
        required: false
        default: false
        type: boolean
      spa-artifact-path:
        required: false
        default: ""
        type: string
      node-version:
        required: false
        default: "24"
        type: string
      python-version:
        required: false
        default: "3.11"
        type: string
      coverage-threshold:
        required: false
        default: 90
        type: number
      pip-install-cmd:
        required: false
        default: 'pip install -e ".[dev,service]" -q'
        type: string
      test-cmd:
        required: false
        default: 'python -m pytest -m "not playwright and not integration" --cov --cov-report=term-missing:skip-covered'
        type: string
      pre-test-cmd:
        required: false
        default: ""
        type: string
      post-test-cmd:
        required: false
        default: ""
        type: string
      build-args:
        description: "Extra Docker build args (newline-separated KEY=VALUE). COMMIT_SHA and SOURCE_BRANCH are provided automatically."
        required: false
        default: ""
        type: string
    outputs:
      has_changes:
        description: "Whether a new nightly build/push actually ran"
        value: ${{ jobs.detect-changes.outputs.has_changes }}
      target_sha:
        description: "The dev commit SHA that was built"
        value: ${{ jobs.detect-changes.outputs.target_sha }}

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      target_sha: ${{ steps.check.outputs.target_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0
      - name: Compare dev HEAD to nightly tag
        id: check
        run: |
          TARGET_SHA=$(git rev-parse HEAD)
          NIGHTLY_SHA=$(git rev-parse "nightly" 2>/dev/null || echo "")
          if [ "${{ github.event_name }}" = "push" ]; then
            HAS_CHANGES=true
          elif [ "${{ inputs.force_run }}" = "true" ]; then
            HAS_CHANGES=true
          elif [ -z "$NIGHTLY_SHA" ] || [ "$TARGET_SHA" != "$NIGHTLY_SHA" ]; then
            HAS_CHANGES=true
          else
            HAS_CHANGES=false
          fi
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint (nightly)
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect-changes.outputs.target_sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install ruff && ruff check src tests tools

  frontend:
    name: Frontend (nightly)
    needs: detect-changes
    if: inputs.has-frontend && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect-changes.outputs.target_sha }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci && npm run typecheck && npm test && npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: spa-dist-${{ github.run_id }}
          path: ${{ inputs.spa-artifact-path }}
          retention-days: 1

  test:
    name: Python Tests (nightly)
    needs: [detect-changes, frontend]
    if: >-
      always() &&
      needs.detect-changes.outputs.has_changes == 'true' &&
      (inputs.has-frontend == false || needs.frontend.result == 'success')
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect-changes.outputs.target_sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - if: inputs.has-frontend
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: spa-dist-${{ github.run_id }}
          path: ${{ inputs.spa-artifact-path }}
      - if: inputs.pre-test-cmd != ''
        run: ${{ inputs.pre-test-cmd }}
      - run: ${{ inputs.pip-install-cmd }}
      - run: ${{ inputs.test-cmd }} --cov-fail-under=${{ inputs.coverage-threshold }}
      - if: always() && inputs.post-test-cmd != ''
        run: ${{ inputs.post-test-cmd }}

  move-tag:
    name: Move nightly Tag
    needs: [detect-changes, lint, test]
    if: >-
      always() &&
      needs.detect-changes.outputs.has_changes == 'true' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TARGET="${{ needs.detect-changes.outputs.target_sha }}"
          git tag -f nightly "$TARGET"
          git push origin nightly --force

  build-and-push:
    name: Build & Push
    needs: [detect-changes, move-tag]
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    if: >-
      always() &&
      needs.detect-changes.outputs.has_changes == 'true' &&
      needs.move-tag.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect-changes.outputs.target_sha }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ghcr.io/${{ inputs.image-name }}:nightly
          build-args: |
            COMMIT_SHA=${{ needs.detect-changes.outputs.target_sha }}
            SOURCE_BRANCH=dev
            ${{ inputs.build-args }}
          labels: |
            org.opencontainers.image.title=${{ inputs.image-name }}
            org.opencontainers.image.description=Nightly build from dev
            org.opencontainers.image.revision=${{ needs.detect-changes.outputs.target_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Trivy Scan
    needs: [build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    continue-on-error: true
    env:
      IMAGE_TAG: ghcr.io/${{ inputs.image-name }}:nightly
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.digest }}
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan image with Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          image-ref: ${{ env.IMAGE_TAG }}${{ env.IMAGE_DIGEST != '' && format('@{0}', env.IMAGE_DIGEST) || '' }}
          format: json
          output: trivy-report.json
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Create scan evidence fallback
        if: always() && steps.trivy.outcome == 'failure' && !hashFiles('trivy-report.json')
        env:
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: |
          python3 - <<'PY'
          import json, os
          report = {
              "image": os.environ["IMAGE_TAG"],
              "digest": os.environ.get("IMAGE_DIGEST", ""),
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "scan_completed": False,
              "scanner": "trivy",
              "scanner_outcome": os.environ.get("TRIVY_OUTCOME", "failure"),
              "error_classification": "scanner_runtime_failure",
              "remediation": "Review the Trivy Scan job logs and rerun the workflow after remediation.",
          }
          with open("trivy-report.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2)
          PY
      - name: Summarize scan outcome
        if: always()
        run: |
          if [ "${{ steps.trivy.outcome }}" = "failure" ]; then
            echo "::warning::Trivy scanner runtime failure; fallback evidence was generated. Review Trivy Scan logs." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Trivy completed; HIGH/CRITICAL vulnerability findings remain advisory (exit-code=0)." >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-report-${{ github.run_id }}
          path: trivy-report.json
          if-no-files-found: error
          retention-days: 14
