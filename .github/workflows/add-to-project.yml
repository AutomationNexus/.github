# Adds the triggering issue to the org-wide delivery Project (see
# docs/org-project.md). The delivery board is ISSUE-CENTRIC: only issues
# become cards, never PRs -- a PR's relationship to its issue is surfaced via
# the built-in Linked pull requests field on the issue instead of a separate
# PR card. Consumer wrappers may still trigger this on both issues (opened,
# transferred) and pull_request (opened) -- see e.g.
# templates/A-python-docker/.github/workflows/add-to-project.yml for the
# wrapper shape used by all 5 starter templates -- the `add` job below gates
# on github.event_name == 'issues' so a pull_request trigger is a harmless
# no-op rather than adding a duplicate PR card.
# This is a narrower, event-driven complement to org-project-sync.yml (which
# reconciles Status on a schedule, plus a repository_dispatch fast path --
# see docs/org-project.md's "Fast path (repository_dispatch)" section); this
# workflow performs intake, then fires a best-effort dispatch so the newly
# added issue's Status lands without waiting for the next hourly cron tick.
name: Add to project

on:
  workflow_call:
    inputs:
      project-url:
        description: Org Project (v2) URL to add the triggering issue to
        required: false
        default: "https://github.com/orgs/AutomationNexus/projects/1"
        type: string
    secrets:
      ci-bot-app-id:
        required: true
      ci-bot-app-private-key:
        required: true

permissions:
  contents: read

concurrency:
  group: add-to-project-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  add:
    name: Add item to org Project
    runs-on: ubuntu-latest
    # Issue-centric board: only an `issues` trigger should ever add a card.
    # A pull_request trigger (still sent by existing consumer wrappers, kept
    # for back-compat) is intentionally a no-op here -- github.event_name
    # reflects the calling workflow's original trigger event, not
    # `workflow_call` itself, so this correctly distinguishes the two even
    # though both share this one reusable workflow.
    if: github.event_name == 'issues'
    timeout-minutes: 5
    steps:
      - name: Mint CI-Bot App token
        id: bot-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.ci-bot-app-id }}
          private-key: ${{ secrets.ci-bot-app-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-organization-projects: write
          permission-issues: read
          permission-pull-requests: read

      - name: Add to project
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: ${{ inputs.project-url }}
          github-token: ${{ steps.bot-token.outputs.token }}

      - name: Dispatch fast-path project sync
        if: always()
        uses: automationnexus/.github/.github/actions/dispatch-project-sync@v1
        with:
          ci-bot-app-id: ${{ secrets.ci-bot-app-id }}
          ci-bot-app-private-key: ${{ secrets.ci-bot-app-private-key }}
          repo: ${{ github.event.repository.name }}
          issue-numbers: ${{ github.event.issue.number }}
