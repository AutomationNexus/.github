# Adds the triggering issue/PR to the org-wide delivery Project (see
# docs/org-project.md). Intended caller trigger: issues (opened, transferred)
# and pull_request (opened) in a consumer repo -- see
# templates/_shared/reference-add-to-project-caller.yml for the wrapper shape.
# This is a narrower, event-driven complement to org-project-sync.yml (which
# reconciles Status on a schedule); this workflow only performs intake.
name: Add to project

on:
  workflow_call:
    inputs:
      project-url:
        description: Org Project (v2) URL to add the triggering issue/PR to
        required: false
        default: "https://github.com/orgs/AutomationNexus/projects/1"
        type: string
    secrets:
      ci-bot-app-id:
        required: true
      ci-bot-app-private-key:
        required: true

permissions:
  contents: read

concurrency:
  group: add-to-project-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  add:
    name: Add item to org Project
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mint CI-Bot App token
        id: bot-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.ci-bot-app-id }}
          private-key: ${{ secrets.ci-bot-app-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-organization-projects: write
          permission-issues: read
          permission-pull-requests: read

      - name: Add to project
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: ${{ inputs.project-url }}
          github-token: ${{ steps.bot-token.outputs.token }}
