name: Release (Docker)

on:
  workflow_call:
    inputs:
      runner-labels:
        required: false
        default: '["ubuntu-latest"]'
        type: string
      publish-runner:
        required: false
        default: '["ubuntu-latest"]'
        type: string
      image-name:
        required: true
        type: string
      platforms:
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
      tag_name:
        required: false
        default: ""
        type: string
      has-frontend:
        required: false
        default: false
        type: boolean
      has-validation:
        required: false
        default: true
        type: boolean
      spa-artifact-path:
        required: false
        default: ""
        type: string
      node-version:
        required: false
        default: "24"
        type: string
      python-version:
        required: false
        default: "3.11"
        type: string
      coverage-threshold:
        required: false
        default: 90
        type: number
      build-args:
        description: "Extra Docker build args (newline-separated KEY=VALUE). COMMIT_SHA and SOURCE_BRANCH are provided automatically."
        required: false
        default: ""
        type: string
    outputs:
      tag_name:
        description: "Resolved release tag"
        value: ${{ jobs.prepare.outputs.tag_name }}

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release Tag
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      event_kind: ${{ steps.resolve.outputs.event_kind }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Resolve tag
        id: resolve
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag_name }}"
            if [ -z "$TAG" ]; then
              echo "tag_name is required for manual dispatch rebuilds"
              exit 1
            fi
            KIND="dispatch"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            KIND="tag_push"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/heads/main ]]; then
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            TAG="v${VERSION}"
            KIND="main_push"
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              git tag -a "$TAG" -m "Release $TAG"
              git push origin "$TAG"
            fi
          else
            echo "Unsupported trigger: ${{ github.event_name }} ${{ github.ref }}"
            exit 1
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "event_kind=$KIND" >> "$GITHUB_OUTPUT"

  frontend:
    if: inputs.has-frontend
    name: Frontend (release)
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: spa-dist-${{ github.run_id }}
          path: ${{ inputs.spa-artifact-path }}
          retention-days: 1

  build-and-push:
    name: Build & Push
    runs-on: ${{ fromJSON(inputs.publish-runner) }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    # Always build (tag_push, dispatch, main_push → validation already passed)
    if: |
      !cancelled() && (
        inputs.has-validation == false ||
        needs.prepare.result == 'success'
      )
    needs: [prepare, frontend]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag_name }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.tag_name }}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.tag_name }}
            COMMIT_SHA=${{ github.sha }}
            SOURCE_BRANCH=main
            ${{ inputs.build-args }}
          provenance: true
          sbom: true

  container-scan:
    name: Container Scan
    needs: [prepare, build-and-push]
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    continue-on-error: true
    env:
      IMAGE_TAG: ghcr.io/${{ inputs.image-name }}:${{ needs.prepare.outputs.tag_name }}
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.digest }}
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan image with Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          image-ref: ${{ env.IMAGE_TAG }}@${{ env.IMAGE_DIGEST }}
          format: json
          output: trivy-report.json
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Create scan evidence fallback
        if: always() && steps.trivy.outcome == 'failure' && !hashFiles('trivy-report.json')
        env:
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: |
          python3 - <<'PY'
          import json, os
          report = {
              "image": os.environ["IMAGE_TAG"],
              "digest": os.environ["IMAGE_DIGEST"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "scan_completed": False,
              "scanner": "trivy",
              "scanner_outcome": os.environ.get("TRIVY_OUTCOME", "failure"),
              "error_classification": "scanner_runtime_failure",
              "remediation": "Review the Container Scan job logs and rerun the workflow after remediation.",
          }
          with open("trivy-report.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2)
          PY
      - name: Summarize scan outcome
        if: always()
        run: |
          if [ "${{ steps.trivy.outcome }}" = "failure" ]; then
            echo "::warning::Trivy scanner runtime failure; fallback evidence was generated. Review Container Scan logs." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Trivy completed; HIGH/CRITICAL vulnerability findings remain advisory (exit-code=0)." >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-report-${{ github.run_id }}
          path: trivy-report.json
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: [prepare, build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag_name }}
      - run: |
          TAG="${{ needs.prepare.outputs.tag_name }}"
          cat > release-body.md <<EOF
          ## Docker
          \`\`\`
          docker pull ghcr.io/${{ inputs.image-name }}:$TAG
          \`\`\`
          **Tags:** \`$TAG\`, \`latest\`, \`v{major}\`
          EOF
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Release ${{ needs.prepare.outputs.tag_name }}
          generate_release_notes: true
          body_path: release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
