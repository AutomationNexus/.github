on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: automationnexus/.github/.github/workflows/ci.yml@v1
    with:
      branch-model: main-dev
      # Private repo? set true and rely on guards (no rulesets on Free plan).
      auto-revert: false
      runner-labels: '["ubuntu-latest"]'
      python-version: "3.11"
      node-version: "24"
      has-frontend: false
      has-e2e: false
      has-integration: false
      has-security: true
      security-paths: src/REPLACE_ME
      lint-paths: src tests tools
      pip-install-cmd: 'pip install -e ".[dev]"'
      test-cmd: 'python -m pytest -q'
      # This repo also ships HA add-on folder(s) (REPLACE_ME_ADDON_DIR, and optionally
      # REPLACE_ME_ADDON_DIR-nightly for a nightly channel). Their version-pointer bumps are
      # published to main via a sync/publish-main-* branch (see nightly.yml/release.yml),
      # which needs to be an allowed PR source into main.
      main-source-allow-glob: 'sync/publish-main-*'
      has-addon-validate: true
    secrets:
      ci-bot-app-id: ${{ secrets.CI_BOT_APP_ID }}
      ci-bot-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
