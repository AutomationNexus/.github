on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: automationnexus/.github/.github/workflows/ci.yml@v1
    with:
      branch-model: main-dev
      # This template repo itself has no live 'dev' branch (bootstrap-repo.sh only creates
      # one on a repo derived from this template) -- fall Guard Main Source Branch back to
      # main-only-style acceptance of any feature branch for direct contributions to this
      # template repo. A repo bootstrapped from this template gets a real 'dev' branch and
      # should flip this back to true (or omit it) once bootstrapped.
      main-source-require-dev: false
      # HA config repos are typically private on Free plan -> rely on guards.
      auto-revert: true
      runner-labels: '["ubuntu-latest"]'
      python-version: "3.12"
      has-ha-validate: true
      has-yaml-lint: true
      has-security: false
      # Lets the sanctioned scripts/sync-templates.sh direct-push (this repo has no dev
      # branch) pass Guard Main Direct Push instead of showing a permanent red X.
      main-direct-push-allow-pattern: '^chore: resync from automationnexus/\.github templates/_shared'
    secrets:
      ci-bot-app-id: ${{ secrets.CI_BOT_APP_ID }}
      ci-bot-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
