on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: automationnexus/.github/.github/workflows/ci.yml@v1
    with:
      branch-model: main-dev
      # Private repo? set true and rely on guards (no rulesets on Free plan).
      auto-revert: false
      runner-labels: '["ubuntu-latest"]'
      python-version: "3.11"
      node-version: "24"
      has-frontend: false
      has-e2e: false
      has-integration: false
      has-security: true
      security-paths: src/REPLACE_ME
      lint-paths: src tests tools
      pip-install-cmd: 'pip install -e ".[dev]"'
      test-cmd: 'python -m pytest -q'
      # Lets the sanctioned scripts/sync-templates.sh direct-push (this repo has no dev
      # branch) pass Guard Main Direct Push instead of showing a permanent red X.
      main-direct-push-allow-pattern: '^chore: resync from automationnexus/\.github templates/_shared'
    secrets:
      ci-bot-app-id: ${{ secrets.CI_BOT_APP_ID }}
      ci-bot-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
