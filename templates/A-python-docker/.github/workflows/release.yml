name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    # Docs/pointer-only commits to main must not rebuild Docker. If this repo also ships
    # an in-repo HA add-on, add its folders here too (e.g. 'modeldeck/**').
    paths-ignore: ["**.md", "docs/**"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to rebuild (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  docker-release:
    uses: automationnexus/.github/.github/workflows/release-docker.yml@v1
    with:
      runner-labels: '["ubuntu-latest"]'
      # REPLACE_ME: must be lowercase -- Docker/GHCR rejects uppercase repository names.
      image-name: automationnexus/replace-me
      platforms: linux/amd64
      tag_name: ${{ inputs.tag_name || '' }}
      has-frontend: false
      has-validation: false
