name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    # Add-on pointer bumps and doc-only commits to main must not rebuild Docker. Tag
    # pushes are unaffected (GitHub does not evaluate path filters for tags).
    paths-ignore: ["**.md", "docs/**", "REPLACE_ME_ADDON_DIR/**", "REPLACE_ME_ADDON_DIR-nightly/**"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to rebuild (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  docker-release:
    uses: automationnexus/.github/.github/workflows/release-docker.yml@v1
    with:
      runner-labels: '["ubuntu-latest"]'
      image-name: automationnexus/REPLACE_ME
      platforms: linux/amd64
      tag_name: ${{ inputs.tag_name || '' }}
      has-frontend: false
      has-validation: false

  # Delete this job entirely if this repo has no stable-channel add-on folder
  # (REPLACE_ME_ADDON_DIR/). Only needed for the app-plus-HA-add-on pattern.
  sync-addon-stable:
    name: Sync stable add-on pin (in-repo)
    needs: [docker-release]
    if: always() && needs.docker-release.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint CI-Bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          ref: dev
          token: ${{ steps.bot-token.outputs.token }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check if sync is needed
        id: sync_check
        run: |
          set -euo pipefail
          TAG="${{ needs.docker-release.outputs.tag_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "v0.0.0" ]; then
            echo "::error::Addon sync aborted: resolved tag is empty or sentinel '${TAG}'. Check docker-release job outputs."
            exit 1
          fi
          pip install pyyaml -q
          if python tools/sync_haos_addon.py . "$TAG" --check-only; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply stable pin
        if: steps.sync_check.outputs.needed == 'true'
        run: |
          set -euo pipefail
          TAG="${{ needs.docker-release.outputs.tag_name }}"
          pip install pyyaml -q
          ADDON_NEW_PARENT="${TAG#v}" python tools/sync_haos_addon.py . "$TAG"
          python tools/validate_ha_addon.py
      - name: Open PR to dev
        id: cpr
        if: steps.sync_check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.bot-token.outputs.token }}
          commit-message: "chore(addon): sync stable pin to ${{ needs.docker-release.outputs.tag_name }}"
          title: "chore(addon): sync stable pin to ${{ needs.docker-release.outputs.tag_name }}"
          body: |
            Automated stable add-on pin sync after this release. Merging this PR (it
            touches REPLACE_ME_ADDON_DIR/**) auto-fires the dev->main promote.
          branch: sync/addon-stable-${{ needs.docker-release.outputs.tag_name }}
          base: dev
          delete-branch: true
      - name: Auto-merge sync PR
        if: steps.sync_check.outputs.needed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR="${{ steps.cpr.outputs.pull-request-number }}"
          head_sha=$(gh pr view "${PR}" --repo "${REPO}" --json headRefOid --jq '.headRefOid')
          echo "Waiting for CI on addon-stable sync PR #${PR} (head ${head_sha})..."
          for attempt in $(seq 1 60); do
            runs_json=$(gh api "repos/${REPO}/actions/runs" \
              --method GET \
              --field event=pull_request \
              --field head_sha="${head_sha}" \
              --field per_page=100 \
              --jq '[.workflow_runs[] | select(.path != ".github/workflows/auto-merge.yml")]')
            ci_count=$(jq '[.[] | select(.path == ".github/workflows/ci.yml")] | length' <<<"${runs_json}")
            pending=$(jq '[.[] | select(.status != "completed")] | length' <<<"${runs_json}")
            failing=$(jq '[.[] | select(.status == "completed" and (.conclusion | IN("success", "skipped", "neutral") | not))] | length' <<<"${runs_json}")
            echo "attempt=${attempt} ci_count=${ci_count} pending=${pending} failing=${failing}"
            if [ "${ci_count}" -gt 0 ] && [ "${pending}" -eq 0 ] && [ "${failing}" -eq 0 ]; then
              echo "Addon-stable sync PR #${PR} CI is green."; break
            fi
            if [ "${failing}" -gt 0 ]; then
              echo "::error::Addon-stable sync PR #${PR} CI failed."; exit 1
            fi
            if [ "${attempt}" -eq 60 ]; then
              echo "::error::Timed out waiting for addon-stable sync PR #${PR} CI."; exit 1
            fi
            sleep 30
          done
          gh pr merge "${PR}" --repo "${REPO}" --merge --delete-branch
          echo "Merged addon-stable sync PR #${PR}. Row-4 trigger on promote-dev-to-main.yml will auto-promote."
