name: Nightly Build

on:
  push:
    branches: [dev]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Build even if no new commits since last nightly"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  nightly:
    uses: automationnexus/.github/.github/workflows/nightly.yml@v1
    with:
      runner-labels: '["ubuntu-latest"]'
      image-name: automationnexus/REPLACE_ME
      platforms: linux/amd64
      force_run: ${{ inputs.force_run || false }}
      has-frontend: false
      coverage-threshold: 90

  # Delete this job entirely if this repo has no nightly-channel add-on folder
  # (REPLACE_ME_ADDON_DIR-nightly/). Only needed for the app-plus-HA-add-on pattern.
  roll-nightly-addon:
    name: Roll & publish nightly add-on pointer
    needs: nightly
    if: needs.nightly.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout built dev commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.nightly.outputs.target_sha }}

      - name: Check nightly add-on folder exists
        id: check
        run: |
          if [ -d "REPLACE_ME_ADDON_DIR-nightly" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::REPLACE_ME_ADDON_DIR-nightly does not exist yet -- skipping nightly add-on pointer roll. See README step 3 to set up the nightly channel."
          fi

      - name: Mint CI-Bot token
        if: steps.check.outputs.exists == 'true'
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}

      - name: Resolve parent version
        if: steps.check.outputs.exists == 'true'
        id: version
        run: |
          V=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "v=$V" >> "$GITHUB_OUTPUT"

      - name: Checkout main (add-on pointer lives here)
        if: steps.check.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.bot-token.outputs.token }}
      - if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Roll nightly add-on pointer
        if: steps.check.outputs.exists == 'true'
        id: roll
        run: |
          set -euo pipefail
          pip install pyyaml -q
          NEW=$(python tools/bump_haos_version.py nightly-roll \
            --parent-version "${{ steps.version.outputs.v }}" \
            --sha "${{ needs.nightly.outputs.target_sha }}" \
            --reason "Nightly image published from dev.")
          python tools/validate_ha_addon.py
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Publish pointer to main (branch + PR + CI-wait + admin-merge)
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW="${{ steps.roll.outputs.new_version }}"
          BRANCH="sync/publish-main-${NEW}"

          git checkout -b "${BRANCH}"
          git add REPLACE_ME_ADDON_DIR-nightly/config.yaml REPLACE_ME_ADDON_DIR-nightly/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to the nightly pointer -- nothing to publish."; exit 0
          fi
          git commit -m "chore(nightly): publish REPLACE_ME_ADDON_DIR-nightly ${NEW} to store"
          git push origin "${BRANCH}"

          gh pr create --repo "${REPO}" --base main --head "${BRANCH}" \
            --title "chore(nightly): publish REPLACE_ME_ADDON_DIR-nightly ${NEW} to store" \
            --body "Automated publish of the nightly add-on pointer after a new :nightly image was built from dev.

          - Nightly add-on version: \`${NEW}\`

          CI must pass before merge."
          PR=$(gh pr list --repo "${REPO}" --base main --head "${BRANCH}" --state open --json number --jq '.[0].number')
          echo "Opened PR #${PR} -- waiting for main CI..."

          sleep 15
          for _ in $(seq 1 60); do
            run="$(gh run list --repo "${REPO}" --workflow ci.yml --branch "${BRANCH}" --limit 5 \
                    --json headSha,status,conclusion \
                    --jq "[.[] | select(.status != null)][0]")"
            st="$(printf '%s' "${run}" | jq -r '.status // "none"')"
            cc="$(printf '%s' "${run}" | jq -r '.conclusion // "none"')"
            echo "  PR CI: status=${st} conclusion=${cc}"
            if [ "${st}" = "completed" ]; then
              [ "${cc}" = "success" ] && break
              echo "::error::PR CI not green (${cc})"; exit 1
            fi
            sleep 15
          done

          # CI-Bot App is a protect-main ruleset bypass actor, so --admin lets it merge
          # this automated publish PR.
          gh pr merge "${PR}" --repo "${REPO}" --merge --delete-branch --admin
          echo "Published REPLACE_ME_ADDON_DIR-nightly ${NEW} to main via PR #${PR}."
