name: Promote dev to main

on:
  workflow_dispatch:
  # Fires automatically when a REPLACE_ME_ADDON_DIR/ change lands on dev — most commonly
  # the sync-addon-stable PR (part of release.yml) syncing the stable pin after a release.
  # There is no version-bump job here: stable add-on version is always exactly the parent
  # release version (see tools/sync_haos_addon.py); an add-on-only content change (no
  # parent release) still auto-promotes so new installs get it immediately, it just
  # doesn't bump the version — existing installed users see it at the next real release.
  # Delete this trigger if this repo has no stable-channel add-on folder.
  push:
    branches: [dev]
    paths:
      - "REPLACE_ME_ADDON_DIR/**"

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    name: Promote dev to main
    uses: automationnexus/.github/.github/workflows/promote-dev-to-main.yml@v1
    with:
      runner-labels: '["ubuntu-latest"]'
      # Delete exclude-paths if this repo has no nightly-channel add-on folder. main is the
      # sole owner of these 2 files (the nightly-publish pathway writes them directly); a
      # plain dev->main merge would otherwise regress them to dev's stale copy.
      exclude-paths: |
        REPLACE_ME_ADDON_DIR-nightly/config.yaml
        REPLACE_ME_ADDON_DIR-nightly/CHANGELOG.md
    secrets:
      ci-bot-app-id: ${{ secrets.CI_BOT_APP_ID }}
      ci-bot-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
