    default_branch: main
    branch_flow: "feature -> PR -> main (no dev branch, no promote workflow)"
    team_policy: minimal
    domain_agents: []
    dev_only_files: false
    sync_role: excluded
    owning_team: automationnexus-platform
    state: exception
    exception:
