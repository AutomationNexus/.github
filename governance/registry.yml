# Canonical AI/human governance registry for AutomationNexus.
#
# Source of truth for: repositories, AI agents, AI commands, human GitHub teams,
# ownership, branch models, sync mechanisms, and documented exceptions. Edit via
# feature branch -> PR -> master (this repo's trunk); validate with
# `python scripts/validate-governance.py`. Never hand-edit a generated copy
# (workspace-root CLAUDE.md/.claude, or a synced repo's .claude/) to fix drift found
# here -- fix it here and re-run the relevant sync script.
#
# Terminology and the human-vs-AI distinction: governance/README.md
# Rendered hierarchy + repo/team/task matrix: governance/organogram.md
#
# verification_state enum (used throughout this file):
#   active              - implemented and verified live (or not applicable to verify live)
#   desired             - documented target state, not yet implemented
#   exception           - intentional, permanent deviation from the full/default policy
#   needs-verification  - implementation may exist but has not been confirmed live
#   permission-limited  - a live check was attempted and blocked by credential/plan scope

schema_version: 1

# -----------------------------------------------------------------------------
# Human GitHub teams. These are the ONLY entities that hold GitHub permissions,
# appear in CODEOWNERS, or belong to an org team. AI agents (below) are never
# represented as GitHub members, teams, or collaborators.
# -----------------------------------------------------------------------------
human_teams:
  - slug: automationnexus-admins
    purpose: Org ownership, billing, ruleset/security-setting changes, final escalation.
    default_repo_permission: admin
    state: active

  - slug: automationnexus-platform
    purpose: Owns automationnexus/.github -- reusable workflows, templates, scripts, rulesets, this registry.
    default_repo_permission: maintain
    state: active

  - slug: automationnexus-security
    purpose: Security-sensitive paths across every repo -- workflows, permissions, secrets hygiene, denylists.
    default_repo_permission: triage
    state: active

  - slug: automationnexus-release
    purpose: Promote/release paths -- promote-dev-to-main triggers, release workflows, tag/version policy.
    default_repo_permission: write
    state: active

  - slug: automationnexus-app-maintainers
    purpose: Application/config source for the versioned app repos and HomeAssistant config.
    default_repo_permission: write
    state: active

# -----------------------------------------------------------------------------
# Org-tier AI agents ("CTO desk"). Load ONLY in a Claude Code session opened at the
# workspace root -- .claude/ does not cascade the way CLAUDE.md does. Canonical
# source: workspace/.claude/agents/.
# -----------------------------------------------------------------------------
org_agents:
  - name: chief-architect
    model: sonnet
    effort: high
    rank: org-lead
    role: Cross-repo planning and routing; emits per-repo handoff briefs.
    decision_rights: Proposes routing, ordering, and briefs. Does not implement or push.
    mutation_class: read-only
    escalation_target: human
    parent: null

  - name: platform-engineer
    model: sonnet
    rank: org-lead
    role: automationnexus/.github internals -- reusable workflows, templates, scripts, rulesets.
    decision_rights: Implements within .github. No cross-repo authority.
    mutation_class: repo-write
    escalation_target: chief-architect
    parent: chief-architect

  - name: release-manager
    model: sonnet
    effort: high
    rank: org-lead
    role: Promote/release orchestration across repos; human-confirmed dispatches only.
    decision_rights: >
      Recommends bump-type and dispatch. Never runs a state-changing gh command without
      explicit human confirmation of that exact action in the current turn.
    mutation_class: cross-repo-write
    confirmation_required: true
    escalation_target: human
    parent: chief-architect

  - name: security-officer
    model: sonnet
    effort: high
    rank: org-lead
    role: Org-wide security audits, read-only.
    decision_rights: Independent audit authority. Findings only, no fixes.
    mutation_class: read-only
    escalation_target: human
    parent: null

  - name: org-inspector
    model: haiku
    rank: org-operational
    role: Read-only live status sweeps across all repos.
    decision_rights: Reports only.
    mutation_class: read-only
    escalation_target: chief-architect
    parent: chief-architect

  - name: template-steward
    model: sonnet
    rank: org-lead
    role: templates/ bundles <-> template-* repos <-> app-repo shared Claude layer consistency.
    decision_rights: >
      Implements template/shared-core edits. Sync scripts require human confirmation per
      their own rules regardless of this agent's recommendation.
    mutation_class: repo-write
    escalation_target: platform-engineer
    parent: platform-engineer

org_commands:
  - name: /dispatch
    owner: chief-architect
    confirmation_class: read-only
    entry_conditions: Any task spanning more than one repo, or touching a reusable-workflow contract.
    outputs: [handoff-brief]
    handoff_handback: required

  - name: /org-status
    owner: org-inspector
    confirmation_class: read-only
    entry_conditions: Current org state needed, something looks broken, before acting on any PR/branch/workflow.
    outputs: [status-table]

  - name: /board-status
    owner: org-inspector
    confirmation_class: read-only
    entry_conditions: Delivery-board snapshot needed (Status/Repository/at-risk/in-flight counts), distinct from repo/CI state.
    outputs: [board-summary]

  - name: /org-audit
    owner: security-officer
    confirmation_class: read-only
    entry_conditions: Before shared-workflow/permission changes roll out; on-demand org security review.
    outputs: [ranked-findings]

  - name: /promote
    owner: release-manager
    confirmation_class: human-confirmation-required
    entry_conditions: User wants to release/promote a repo, or a promote/release is stuck.
    outputs: [gate-by-gate-status]

  - name: /sync-templates
    owner: template-steward
    confirmation_class: human-confirmation-required
    entry_conditions: templates/ bundles changed and need to reach the 5 template-* repos.
    outputs: [sync-report]

  - name: /sync-workspace
    owner: platform-engineer
    confirmation_class: human-confirmation-required
    entry_conditions: workspace/ canonical changed and the workspace root needs refreshing.
    outputs: [drift-report]

  - name: /clean-workspace
    owner: platform-engineer
    confirmation_class: human-confirmation-required
    entry_conditions: Merged-work git leftovers (stale worktrees, merged local branches, parked checkouts) accumulated in the workspace-root clones; run after multi-agent sweeps. --check dry-run is read-only; --prune requires confirmation.
    outputs: [prune-report]

  - name: /new-repo
    owner: chief-architect
    confirmation_class: human-confirmation-required
    entry_conditions: User wants to create a new org repo.
    outputs: [bootstrap-confirmation]

# -----------------------------------------------------------------------------
# Repo-core AI team: the 4 shared roles every full repo standardizes on. Canonical
# source: templates/_shared/.claude/. Propagated by scripts/sync-shared-claude.sh
# (marker-aware: preserves each repo's own `description:` line and everything below
# `<!-- repo-specific -->`).
# -----------------------------------------------------------------------------
repo_core_team:
  - name: architect
    model: sonnet
    effort: high
    decision_rights: Proposes boundaries, sequencing, and validation needs. Does not implement.
    mutation_class: read-only

  - name: qa-gatekeeper
    model: haiku
    decision_rights: Final release/PR evidence gate. Reports pass/fail, not architectural preference.
    mutation_class: read-only

  - name: reviewer
    model: sonnet
    decision_rights: Independent challenge function. No rewrites unless explicitly assigned a fix pass.
    mutation_class: read-only

  - name: security-auditor
    model: sonnet
    effort: high
    decision_rights: Independent challenge function. No rewrites unless explicitly assigned a fix pass.
    mutation_class: read-only

repo_core_commands:
  - name: /execute
    owner: main-session
    confirmation_class: repo-write
    entry_conditions: Any code change in this repo, from a one-file trivial fix through a multi-domain feature.
    outputs: [risk-track-classification, pr]
    risk_tracks: [A, B, C]
  - name: /qa
    owner: qa-gatekeeper
    confirmation_class: read-only
    entry_conditions: Local QA gate needed before PR, or as the final gate an /execute pass runs after review/security fixes.
    outputs: [pass-fail-report]
  - name: /prepush
    owner: qa-gatekeeper
    confirmation_class: read-only
    entry_conditions: A feature branch is about to be pushed; readiness check before push.
    outputs: [pass-fail-report]
  - name: /release
    owner: main-session
    confirmation_class: human-confirmation-required
    entry_conditions: dev CI is green and a promote/release to main is being considered.
    outputs: [gate-by-gate-status]
    risk_tracks: [D]

# -----------------------------------------------------------------------------
# Repositories.
#   class:        meta | full | config-only | minimal | template
#   team_policy:  meta-core | full-core | minimal | stub
#   sync_role:    canonical-source | consumer | template-target | excluded
#
# domain_agents/extra_qa_gates/extra_orchestration are repo-local additions beyond
# the shared repo-core team -- registered orchestration profiles, not defects.
# -----------------------------------------------------------------------------
repositories:
  - repo: .github
    class: meta
    default_branch: master
    branch_flow: "feature -> PR -> master"
    team_policy: meta-core
    domain_agents: [workflow-engineer]
    dev_only_files: false
    sync_role: canonical-source
    owning_team: automationnexus-platform
    state: active
    notes: >
      Canonical source for workspace/ (org tier) and templates/_shared/.claude/
      (repo core). This registry lives here. architect + security-auditor roles are
      present in .claude/agents/ -- meta-repo team complete (organogram.md open items
      #1, resolved). protect-master.json applied live 2026-07-14 (ruleset id
      18944524), backed by new self-ci.yml/self-semgrep.yml caller wrappers and a
      .yamllint config -- this repo's own PRs previously ran zero status checks
      since ci.yml/semgrep.yml here are workflow_call-only definitions, not
      triggered on .github itself (organogram.md open items #10, resolved).
      2026-07-16 (#35): native `allow_auto_merge` repo setting normalized to off
      across all 12 org repos, including this one -- it is unused (auto-merge.yml's
      CI-Bot App does an immediate `gh pr merge` after green checks, not GitHub's
      native auto-merge queue) and can never be enabled uniformly on the org's
      GitHub Free plan anyway (private repos need a paid plan). scripts/bootstrap-repo.sh
      now sets it to false on every newly bootstrapped repo. Root README.md's
      "This repo's own master merges" section corrected to match -- it previously
      described relying on the native flag being on for this repo's own PRs, which
      is no longer accurate.
      2026-07-16 (branch feat/board-issue-centric-lean, PR pending): delivery
      board redesigned to ISSUE-CENTRIC and LEAN. Issues are now the only board
      cards; a PR never gets its own item -- its progress surfaces via the
      linked issue's derived Status (resolved from `closedByPullRequestsReferences`)
      instead. add-to-project.yml gates its add step to `github.event_name ==
      'issues'` (a v1 tag advance is required before this reaches consumers).
      org-project-sync.yml's reconcile() now classifies each issue's linked
      PR(s) via a new pr_stage() helper and writes the issue's Status directly
      (Done added as a rank-5 stage, just below Released, for closed issues with
      no shippable linked PR); the old PR-item-driven cross-check pass is
      removed. bootstrap-org-project.sh's Status-options step is now
      create-only (checks for "Backlog" before mutating) after live GraphQL
      introspection confirmed the prior full-replace mutation mints new option
      ids for every option (even unchanged ones) and silently blanks every
      item's stored Status -- destructive on any already-populated board. The
      unused planning layer (Bump type, Priority, Track, Release target, Start
      date, Target date) was dropped from bootstrap-org-project.sh and
      board-digest.yml/docs, since none of it was read or written by any
      automation. See docs/org-project.md for the full derived-status model.
      2026-07-18 (branch feat/board-sync-fast-path): delivery board Status
      automation gained a repository_dispatch fast path so a merge/PR/intake
      event no longer waits for org-project-sync.yml's hourly cron (real
      2-3 hour gaps observed live, e.g. Uploadarr #66/#67 stuck In Progress
      20+ min after merge). New composite action
      .github/actions/dispatch-project-sync fires a best-effort dispatch;
      add-to-project.yml, auto-merge.yml (new dispatch-in-review job plus
      post-merge dispatches), and promote-dev-to-main.yml (inlined
      dispatch_project_sync_full_sweep(), using a second, narrowly-scoped
      .github-only token isolated from the primary push/merge token) all
      call it. org-project-sync.yml refactored to hoist
      RANK/STATUS_BUCKET/release_ref()/released_or_ondev()/pr_stage() to
      module scope and extract a shared classify_and_set() used by both the
      full reconcile() sweep and the new targeted_sync() single-issue path
      -- zero duplicated classification logic between the two. Also
      implements the previously undocumented/manual-only "In Progress"
      status automatically, via the issue's linkedBranches GraphQL
      connection (gh issue develop --checkout or the issue page's "Create a
      branch" button -- not a plain git checkout -b). Companion hardening:
      auto-merge.yml's and promote-dev-to-main.yml's pre-existing Mint
      CI-Bot token steps narrowed from unscoped installation-wide tokens to
      an explicit repositories list (still default/all-permissions for that
      repo, deliberately unchanged since existing merge/promote steps
      already relied on that breadth); each of those workflows separately
      gained a brand-new, wholly distinct .github-only Contents:write token
      used only for the dispatch call (and, in promote-dev-to-main.yml, the
      shared-workflow helper checkout) -- this second token is an addition,
      not a narrowing of the first. Requires the CI-Bot App to gain an
      org-installation-level Contents:write grant reaching .github itself
      for the dispatch endpoint to work -- see the new
      board-sync-cross-repo-dispatch exceptions entry below and
      docs/org-project.md's "Fast path (repository_dispatch)" section.
      IMPORTANT (security-audit finding, unresolved as of this note):
      because a GitHub App installation token's permissions aren't scoped
      per call-site, granting the App org-installation-level Contents:write
      reaching .github means every consumer repo's *existing*
      ci-bot-app-id/ci-bot-app-private-key secrets -- not just this new
      composite action's usage of them -- can mint an equivalent
      .github-scoped Contents:write token from any workflow step in that
      repo. The grant widens the blast radius of every consumer repo's
      already-present CI-Bot secret, not just this dispatch mechanism.
      Confirm .github's branch protection covers this before the grant is
      made (see board-sync-cross-repo-dispatch exceptions entry below).

  - repo: CognitiveSystems
    class: full
    default_branch: dev
    branch_flow: "feature -> PR -> dev -> auto-merge -> dev -> promote-dev-to-main -> PR -> main -> release.yml"
    team_policy: full-core
    domain_agents: [service-engineer, frontend-engineer]
    dev_only_files: true
    sync_role: consumer
    owning_team: automationnexus-app-maintainers
    state: active
    notes: "CLAUDE.md's /pr routing defect fixed (CognitiveSystems PR #56, 2026-07-14)."

  - repo: MediaRefinery
    class: full
    default_branch: dev
    branch_flow: "feature -> PR -> dev -> auto-merge -> dev -> promote-dev-to-main -> PR -> main -> release.yml"
    team_policy: full-core
    domain_agents: [backend-engineer, frontend-engineer]
    dev_only_files: true
    sync_role: consumer
    owning_team: automationnexus-app-maintainers
    state: active
    notes: >
      domain_agents corrected 2026-07-14: registry previously listed none, but
      .claude/agents/ and CLAUDE.md's Subagents table both document backend-engineer
      (src/mediarefinery/ FastAPI/Immich/ONNX/OCR pipeline) and frontend-engineer
      (frontend/ React dashboard) as real, routed domain agents. Registry data was
      simply never recorded, not a repo-side defect.

  - repo: ModelDeck
    class: full
    default_branch: main
    branch_flow: >-
      feature -> PR -> dev -> auto-merge -> dev -> promote-dev-to-main -> PR -> main ->
      release.yml (+ push-triggered add-on-only path on modeldeck/**, bump-type=none)
    team_policy: full-core
    domain_agents: [mqtt-engineer, addon-engineer]
    extra_qa_gates: [addon-qa-gatekeeper]
    dev_only_files: true
    sync_role: consumer
    owning_team: automationnexus-app-maintainers
    state: exception
    exception:
      rationale: >
        Unlike its 3 sibling app repos (default dev), ModelDeck's live default branch is
        deliberately main -- documented in ModelDeck/CLAUDE.md: the HA add-on store reads
        the add-on manifest from the default branch, and GitHub Actions `schedule:`
        triggers always evaluate the workflow file version on the default branch, never
        dev's copy. Re-verified live 2026-07-14 (gh repo view): confirmed main, matches
        the documented rationale -- not drift.
      owner: automationnexus-app-maintainers
      review_trigger: HA add-on discovery mechanism changes, or ModelDeck drops its add-on
        channels and becomes a pure Python service.
    notes: >
      architect existed locally but was missing from the repo's visible routing table --
      fixed (ModelDeck PR #107). .claude/settings.json already carries the
      Bash(git push origin dev:*) / Bash(git push origin main:*) denies -- re-verified live
      2026-07-14, no action needed (was already fixed by the time this was re-checked).

  - repo: Uploadarr
    class: full
    default_branch: dev
    branch_flow: "feature -> PR -> dev -> auto-merge -> dev -> promote-dev-to-main -> PR -> main -> release.yml"
    team_policy: full-core
    domain_agents: [tracker-engineer, frontend-engineer]
    dev_only_files: true
    sync_role: consumer
    owning_team: automationnexus-app-maintainers
    state: active
    notes: >
      domain_agents corrected 2026-07-14: registry previously listed none, but
      .claude/agents/ and CLAUDE.md's Subagents table both document tracker-engineer
      (Python backend, tracker automation, upload pipeline) and frontend-engineer
      (React dashboard) as real, routed domain agents. Registry data was simply never
      recorded, not a repo-side defect.

  - repo: HomeAssistant
    class: config-only
    default_branch: dev
    branch_flow: "feature -> PR -> dev -> auto-merge -> dev -> promote-dev-to-main (bump-type + version-file=VERSION) -> PR -> main -> release-tag.yml (tag + GitHub Release; version sourced from VERSION file, no pyproject.toml)"
    team_policy: full-core
    domain_agents: [yaml-engineer, live-inspector, drift-sync, release-operator]
    extra_orchestration: [dry-run-deploy]
    dev_only_files: true
    sync_role: consumer
    owning_team: automationnexus-app-maintainers
    state: active
    notes: >
      domain_agents corrected 2026-07-14: yaml-engineer (HA YAML/packages/blueprints/
      dashboards/helpers) was present in .claude/agents/ and CLAUDE.md's Subagents
      table but missing from the registry -- added. extra_orchestration's
      dry-run-deploy is not an agent file; it names the /deploy-dry-run command
      (dispatches release-operator for a deploy preflight), confirmed intentional,
      not drift.
      2026-07-16: branch_flow updated for issue #68 (adopt vX.Y.Z tagging for a
      pyproject-less repo) -- promote-reconcile.py gained a --version-file bump path
      and a new release-tag.yml reusable workflow (tag + GitHub Release, no
      build/publish job) landed in automationnexus/.github. This is the platform side
      only: HomeAssistant's own promote-dev-to-main.yml wrapper (version-file input)
      and a new release-tag.yml caller are a separate follow-up, not yet applied --
      until that lands and a promote runs, org-project-sync still reports HA merges
      as "On Dev" (no vX.Y.Z tag exists yet to compare against).

  - repo: MikroTik_Systems
    class: config-only
    default_branch: dev
    branch_flow: "feature -> PR -> dev -> auto-merge -> dev -> promote-dev-to-main (bump-type + version-file=VERSION) -> PR -> main -> release-tag.yml (tag + GitHub Release; version sourced from VERSION file, no pyproject.toml)"
    team_policy: full-core
    domain_agents: [network-doctor, wireguard-engineer, hotspot-radius-engineer, firewall-nat-engineer, backup-operator, drift-auditor, network-inspector, release-operator]
    dev_only_files: true
    sync_role: consumer
    owning_team: automationnexus-app-maintainers
    state: active
    notes: >
      Private live-router digital twin (CognitiveSystems MikroTik fleet: CHR hub +
      Essen/HB-1/HB-2 spokes; WireGuard, hotspot, RADIUS/User-Manager) modeled 1:1 on
      HomeAssistant. Live routers are canonical; the human local pull/review/PR path is
      the sole route from live-router data into Git; guarded-apply.ps1 is local-only and
      human-confirmed and is the only writer; a merge/promote/tag never writes to a
      router and never pulls live data. CI is report-only: two repo-specific read-only
      monitors (backup-health.yml, drift-check.yml) run on ARC beside the shared workflow
      callers -- schedule/dispatch only, issues only, no commit/branch/PR/backup/config/
      router write, and no age key (live SSH is opt-in via a dedicated read-only key).

  - repo: ARCRunner
