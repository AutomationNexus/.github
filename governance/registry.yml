      were already current and unaffected by this sync.

# -----------------------------------------------------------------------------
# Command authority classes. Every org/repo command's confirmation_class must be
# one of these.
# -----------------------------------------------------------------------------
authority_classes:
  - read-only
  - repo-write
  - cross-repo-write
  - admin-state
  - human-confirmation-required

# -----------------------------------------------------------------------------
# Explicit exceptions not already captured on a repo/agent entry above.
# -----------------------------------------------------------------------------
exceptions:
  - id: sync-templates-direct-push
    description: >
      scripts/sync-templates.sh direct-pushes to the 5 template-* repos' main branch --
      the org's one documented protected-branch-bypass. Always requires explicit human
      confirmation before each run.
    owner: automationnexus-platform
    review_trigger: never automate further -- confirmation-per-run is permanent by design.

  - id: modeldeck-addon-auto-promote
    description: >
      ModelDeck's push-triggered add-on-only promote path auto-promotes modeldeck/**
      changes with bump-type=none, bypassing the human-confirmed dispatch every other
      promotion requires.
    owner: automationnexus-app-maintainers
    review_trigger: scope of the push-triggered path expands beyond modeldeck/**.

  - id: board-sync-cross-repo-dispatch
    description: >
      The delivery-board fast path (add-to-project.yml, auto-merge.yml,
      promote-dev-to-main.yml) mints a .github-scoped CI-Bot token from each
      consumer repo's own workflow run and fires a repository_dispatch at
      automationnexus/.github's /dispatches endpoint to trigger
      org-project-sync.yml's near-instant targeted_sync() path, ahead of its
      hourly cron. This requires the CI-Bot GitHub App to hold an
      org-installation-level Contents:write grant reaching .github itself --
      broader than a typical consumer repo's own CI-Bot grant, since every
      one of the app/pypi/docker/ha-config repos can now write (a narrow,
      dispatch-only surface) to .github's event stream, not just read
      shared-workflow content from it. Best-effort and fail-open by design: a
      missing grant or failed dispatch degrades to a ::warning:: and the
      hourly cron sweep, never a job failure -- see docs/org-project.md's
      "Fast path (repository_dispatch)" section.

      Blast-radius note: GitHub App installation-token permissions are not
      scoped per call-site -- they're a property of the App's installation
      grant. Once the org-installation-level Contents:write grant reaching
      .github exists, every consumer repo's own pre-existing
      ci-bot-app-id/ci-bot-app-private-key secrets (already present for that
      repo's own CI-Bot mints, unrelated to this dispatch mechanism) can
      mint an equivalent .github-scoped Contents:write token from any
      workflow step in that repo -- not only via this composite action's
      code path. Contents:write also permits pushing new branches/refs to
      .github, not just firing repository_dispatch events. This is an
      accepted, reviewed tradeoff (the alternative -- a distinct narrower
      GitHub App per consumer repo -- was judged not worth the operational
      overhead for a fail-open, best-effort latency optimization), not an
      oversight, but it means the actual security boundary here is
      .github's branch protection (protect-master ruleset) plus this
      exception's review_trigger, not the token's nominal narrow scope.
    owner: automationnexus-platform
    review_trigger: >
      a consumer repo's dispatch payload gains fields beyond
      {owner, repo, issue_number|full_sweep}; any repo other than .github
      becomes a repository_dispatch target from this mechanism; the
      org-installation Contents:write grant reaching .github is widened
      beyond Contents (permission-scope creep on the CI-Bot App's
      installation, which -- per the blast-radius note above -- affects
      every consumer repo's existing secret, not just this dispatch path);
      or .github's protect-master ruleset changes in a way that would let a
      Contents:write token bypass required review.
